name: pi_hub_app
description: "Android dashboard for monitoring and controlling Pi Hub sessions over any network."
publish_to: 'none'
version: 2.0.4+4

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  file_picker: ^8.1.7
  # Push stays provider-neutral/local: app registers device via hub API; server may dispatch via ntfy when configured.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
